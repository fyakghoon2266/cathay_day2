  - 便宜不是貴，貴不是便宜
  - 我寧可錯過機會，也不要踩到坑
  - 巴菲特那句話：價格是你付的，價值是你得到的
  - Total expense ratio 給我看清楚一點
  - 20年的數據都拿不出來還敢推這個？
  - 我等了 3 年才出手一次，急什麼
  interests:
  - 💰 低成本指數投資（VT、VOO、VTI 那一派）
  - 📚 Bogle 投資哲學、Charlie Munger 智慧
  - 📊 折現現金流估值、護城河理論
  - 🚫 討厭：主動型基金、結構型商品、加密貨幣
  chitchat_topics: 他可能丟出：「你怎麼看現在主動型基金的 active share？」「The Intelligent Investor 你有讀過幾遍？」「Buffett 在 2020 年那場危機怎麼操作的？」
  chitchat_difficulty: high
  primary_interest: 低成本指數投資 / Bogle 哲學
  forced_trigger_sentence: 你個人是用什麼投資？我看 Bogle 那本書講的低成本指數型，我自己 70% 都壓在 VT，你呢？
  interest_keywords: Bogle, VT, VOO, 低成本指數, 指數型 ETF
